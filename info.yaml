# Tiny Tapeout project information
project:
  title:        "An WIP Online Workshop 2026 project"      # Project title
  author:       "Airat Galiamov"      # Your name
  discord:      "DuzaBF"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "An WIP Online Workshop 2026 project with something nice"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     1       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_duzabf_2026_ow"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "counter.v"
    - "ascii7seg.v"
    - "num2ascii.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Enable counter"
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "Outputs to the 7 segment display"
  uo[1]: "Outputs to the 7 segment display"
  uo[2]: "Outputs to the 7 segment display"
  uo[3]: "Outputs to the 7 segment display"
  uo[4]: "Outputs to the 7 segment display"
  uo[5]: "Outputs to the 7 segment display"
  uo[6]: "Outputs to the 7 segment display"
  uo[7]: "DP on the display, toggles every clock"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
